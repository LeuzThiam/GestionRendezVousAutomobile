name: CI

on:
  push:
    branches:
      - master
      - dev
      - feature/**
      - fix/**
  pull_request:
    branches:
      - master
      - dev
      - feature/**
      - fix/**
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DJANGO_SECRET_KEY: ci-secret-key-long-pour-github-actions-123456
  DJANGO_DEBUG: "False"

jobs:
  frontend:
    name: Frontend Tests And Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garageflow-web

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: garageflow-web/package-lock.json

      - name: Installer les dependances frontend
        run: npm ci

      - name: Lancer les tests frontend
        run: npm run test -- --run

      - name: Lancer le build frontend
        run: npm run build

  backend:
    name: Backend Checks And Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garageflow-api

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: garageflow-api/requirements-ci.txt

      - name: Installer les dependances backend
        run: pip install -r requirements-ci.txt

      - name: Verifier les migrations manquantes
        run: python manage.py makemigrations --check --dry-run

      - name: Verifier les migrations Django
        run: python manage.py migrate --noinput

      - name: Lancer les tests Django
        run: python manage.py test --verbosity 2
