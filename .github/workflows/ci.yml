name: CI

on:
  push:
    branches:
      - master
      - dev
      - feature/**
      - fix/**
  pull_request:
    branches:
      - master
      - dev

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TravailPratique01/gestion-reparation-automobile

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: TravailPratique01/gestion-reparation-automobile/package-lock.json

      - name: Installer les dependances frontend
        run: npm ci

      - name: Lancer le build frontend
        run: npm run build

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GestionBackend

    steps:
      - name: Recuperer le depot
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: GestionBackend/requirements-ci.txt

      - name: Installer les dependances backend
        run: pip install -r requirements-ci.txt

      - name: Verifier les migrations Django
        run: python manage.py migrate --noinput
        env:
          DJANGO_SECRET_KEY: ci-secret-key-long-pour-github-actions-123456
          DJANGO_DEBUG: "False"

      - name: Lancer les tests Django
        run: python manage.py test
        env:
          DJANGO_SECRET_KEY: ci-secret-key-long-pour-github-actions-123456
          DJANGO_DEBUG: "False"
